name: askmydocs

services:
  db:
    image: pgvector/pgvector:0.8.3-pg16
    container_name: askmydocs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: askmydocs
      POSTGRES_PASSWORD: askmydocs
      POSTGRES_DB: askmydocs
    ports:
      - "5434:5432"
    volumes:
      - askmydocs_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U askmydocs -d askmydocs" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: askmydocs-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://askmydocs:askmydocs@db:5432/askmydocs
      FRONTEND_URL: http://localhost:3000
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles:
      - tools
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://askmydocs:askmydocs@db:5432/askmydocs
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://localhost:3000
    command: [ "pnpm", "--filter", "api", "db:migrate" ]
    depends_on:
      db:
        condition: service_healthy
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: askmydocs-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

  db-studio:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: askmydocs-db-studio
    profiles:
      - tools
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://askmydocs:askmydocs@db:5432/askmydocs
    ports:
      - "4983:4983"
    command: [ "pnpm", "--filter", "api", "exec", "drizzle-kit", "studio", "--host=0.0.0.0", "--port=4983" ]
    depends_on:
      db:
        condition: service_healthy

volumes:
  askmydocs_db_data:
